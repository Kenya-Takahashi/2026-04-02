services:
  app:
    build: .
    ports:
      - "80:3001"
    volumes:
      - uploads:/app/uploads
      - data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uploads:
  data:
