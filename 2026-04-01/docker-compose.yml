services:
  app:
    build: .
    container_name: prompt-forge
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/server/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/server/data/prompt-forge.db

volumes:
  app-data:
