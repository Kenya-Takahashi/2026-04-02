services:
  server:
    build:
      context: ./server
    environment:
      PORT: 3001
      DB_PATH: /app/data/db.sqlite
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    expose:
      - "3001"
    ports:
      - "127.0.0.1:${SERVER_PORT:-3001}:3001"
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  client:
    build:
      context: ./client
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped

volumes:
  sqlite_data:
