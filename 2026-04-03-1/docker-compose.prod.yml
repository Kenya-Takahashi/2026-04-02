services:
  app:
    build:
      context: .
      args:
        APP_BASE_URL: ${APP_BASE_URL}
        APP_BASE_PATH: ${APP_BASE_PATH}
    environment:
      DATABASE_PATH: ${DATABASE_PATH}
      APP_TIME_ZONE: ${APP_TIME_ZONE}
      APP_BASE_URL: ${APP_BASE_URL}
      APP_BASE_PATH: ${APP_BASE_PATH}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
    volumes:
      - ${RF_DATA_DIR:-./data}:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000$${APP_BASE_PATH}/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_BASE_PATH: ${APP_BASE_PATH}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${RF_CADDY_DATA_DIR:-./caddy_data}:/data
      - ${RF_CADDY_CONFIG_DIR:-./caddy_config}:/config
    restart: unless-stopped
